<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- HTML Meta Tags -->
    <title>SkillShow - Build and Showcase Your Professional Portfolio</title>
    <meta
      name="description"
      content="Easily create and publish your professional portfolio with SkillShow. Interactive dashboards, categorized templates, and responsive design."
    />

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="https://skillshow-portfolio.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="SkillShow - Build and Showcase Your Professional Portfolio"
    />
    <meta
      property="og:description"
      content="Easily create and publish your professional portfolio with SkillShow. Interactive dashboards, categorized templates, and responsive design."
    />
    <meta
      property="og:image"
      content="https://skillshow-portfolio.vercel.app/src/assets/Icon/logo.PNG"
    />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="twitter:domain" content="skillshow-portfolio.vercel.app" />
    <meta
      property="twitter:url"
      content="https://skillshow-portfolio.vercel.app/"
    />
    <meta
      name="twitter:title"
      content="SkillShow - Build and Showcase Your Professional Portfolio"
    />
    <meta
      name="twitter:description"
      content="Easily create and publish your professional portfolio with SkillShow. Interactive dashboards, categorized templates, and responsive design."
    />
    <meta
      name="twitter:image"
      content="https://skillshow-portfolio.vercel.app/src/assets/Icon/logo.PNG"
    />

    <!-- Meta Tags Generated via https://www.opengraph.xyz -->

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
  </head>
  <body class="bg-background">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <!-- public/index.html -->
    <script>
      (function () {
        try {
          const theme = localStorage.getItem("appTheme");
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </body>
</html>
