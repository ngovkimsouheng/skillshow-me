<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillShow - Build and Showcase Your Professional Portfolio</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Easily create and publish your professional portfolio with SkillShow. Interactive dashboards, categorized templates, and responsive design."
    />
    <meta
      name="keywords"
      content="SkillShow, portfolio builder, developer portfolio, student portfolio, resume website, personal website, portfolio templates"
    />
    <meta name="author" content="SkillShow Team" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://skillshow-portfolio.vercel.app/" />
    <meta
      property="og:title"
      content="SkillShow - Build and Showcase Your Professional Portfolio"
    />
    <meta
      property="og:description"
      content="Create stunning portfolios with templates, dashboards, and customization."
    />
    <meta
      property="og:image"
      content="https://skillshow-portfolio.vercel.app/image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="SkillShow" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:url"
      content="https://skillshow-portfolio.vercel.app/"
    />
    <meta
      name="twitter:title"
      content="SkillShow - Build and Showcase Your Professional Portfolio"
    />
    <meta
      name="twitter:description"
      content="Create stunning portfolios بسهولة with templates, dashboards, and customization."
    />
    <meta
      name="twitter:image"
      content="https://skillshow-portfolio.vercel.app/image.png"
    />

    <!-- Theme color -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://skillshow-portfolio.vercel.app/" />

    <!-- Flowbite -->
    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-background">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <!-- public/index.html -->
    <script>
      (function () {
        try {
          const theme = localStorage.getItem("appTheme");
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </body>
</html>
