<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillShow - Build and Showcase Your Professional Portfolio</title>

    <!-- General SEO -->
    <meta
      name="description"
      content="SkillShow is a user-friendly portfolio builder designed to help students and job seekers easily create professional, personalized portfolios. With categorized templates, interactive dashboards, customizable options, and responsive design, SkillShow empowers users to confidently showcase their skills and career potential."
    />
    <meta
      name="keywords"
      content="SkillShow, Portfolio Builder, Professional Portfolio, Templates, User Dashboard, Dark Mode, Responsive Design, Career Portfolio"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="SkillShow - Build and Showcase Your Professional Portfolio"
    />
    <meta
      property="og:description"
      content="Easily create and publish your professional portfolio with SkillShow. Interactive dashboards, categorized templates, and responsive design."
    />
    <meta
      property="og:image"
      content="/src/assets/Icon/logo.PNG"
    />
    <meta property="og:url" content="https://skillshow-me.vercel.app/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SkillShow - Build Your Portfolio" />
    <meta
      name="twitter:description"
      content="Create professional portfolios effortlessly with SkillShow. Showcase your skills and career potential."
    />
    <meta
      name="twitter:image"
      content="/src/assets/Icon/logo.PNG"
    />

    <!-- LinkedIn / Telegram uses Open Graph tags -->
    <!-- Optional: specify image size for better preview -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
  </head>
  <body class="bg-background">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
